<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      background: #0096d6; /* HP blue */
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg { flex-shrink: 0; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .content { padding: 16px; }

    /* Status banner */
    .status {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status.info    { background: #e8f4fd; color: #0277bd; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error   { background: #fce4ec; color: #c62828; }
    .status.warning { background: #fff8e1; color: #f57f17; }

    /* Exercise list */
    .exercise-list { list-style: none; margin-bottom: 12px; }
    .exercise-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .exercise-item:last-child { border-bottom: none; }
    .exercise-name {
      font-weight: 500;
      text-transform: capitalize;
      flex: 1;
    }
    .exercise-meta {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      margin-left: 12px;
    }

    /* Buttons */
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #0096d6; color: #fff; }
    .btn-generate { background: #2e7d32; color: #fff; margin-top: 8px; }

    /* Summary */
    .summary {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 8px;
    }

    /* Filename input */
    .filename-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .filename-row label { font-size: 12px; color: #666; white-space: nowrap; }
    .filename-row input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    /* Hidden sections */
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="#fff" stroke-width="2"/>
      <path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <h1>PT → Garmin FIT</h1>
      <p>Extract exercises & generate workout file</p>
    </div>
  </div>

  <div class="content">
    <!-- Step 1: Extract -->
    <div id="step-extract">
      <div id="status" class="status info">
        Navigate to your PT Wired exercise page, then click Extract.
      </div>
      <button id="btn-extract" class="btn-primary">
        Extract Exercises
      </button>
    </div>

    <!-- Step 2: Review & Generate -->
    <div id="step-review" class="hidden">
      <div id="review-status" class="status success"></div>
      <ul id="exercise-list" class="exercise-list"></ul>

      <div class="filename-row">
        <label for="filename">Filename:</label>
        <input type="text" id="filename" value="pt_workout.fit">
      </div>

      <button id="btn-generate" class="btn-generate">
        Generate & Download FIT File
      </button>
      <button id="btn-re-extract" class="btn-primary" style="margin-top: 6px;">
        Re-Extract
      </button>
      <div id="summary" class="summary"></div>
    </div>
  </div>

  <!-- Popup scripts are ES modules so we can import the FIT writer -->
  <script type="module" src="popup.js"></script>
</body>
</html>
